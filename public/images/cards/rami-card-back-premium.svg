<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 630 882" width="630" height="882">
  <defs>
    <!-- Metallic gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="25%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F0D060"/>
      <stop offset="75%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#C8A22E"/>
    </linearGradient>
    
    <!-- Subtle gold foil shimmer -->
    <linearGradient id="foilShimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.05"/>
      <stop offset="30%" stop-color="#F5F0E1" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#D4AF37" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#F5F0E1" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.04"/>
    </linearGradient>

    <!-- Bordeaux gradient for depth -->
    <radialGradient id="bordeauxDepth" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#9B2335"/>
      <stop offset="60%" stop-color="#8B1E2F"/>
      <stop offset="100%" stop-color="#6B1525"/>
    </radialGradient>

    <!-- Cardstock texture filter -->
    <filter id="cardTexture" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="textured"/>
      <feComposite in="textured" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Emboss effect -->
    <filter id="emboss" x="-2%" y="-2%" width="104%" height="104%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.5" result="blur"/>
      <feOffset in="blur" dx="0.5" dy="0.5" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>

    <!-- Eight-pointed star pattern tile -->
    <pattern id="starPattern" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <!-- Eight-pointed star -->
      <polygon points="30,4 34.5,21 51.5,13 40,26.5 56,30 40,33.5 51.5,47 34.5,39 30,56 25.5,39 8.5,47 20,33.5 4,30 20,26.5 8.5,13 25.5,21" 
               fill="none" stroke="url(#goldGrad)" stroke-width="0.6" opacity="0.55"/>
      <!-- Inner circle -->
      <circle cx="30" cy="30" r="8" fill="none" stroke="url(#goldGrad)" stroke-width="0.4" opacity="0.4"/>
      <!-- Tiny center dot -->
      <circle cx="30" cy="30" r="1.5" fill="#D4AF37" opacity="0.35"/>
      <!-- Corner dots -->
      <circle cx="0" cy="0" r="1.2" fill="#D4AF37" opacity="0.25"/>
      <circle cx="60" cy="0" r="1.2" fill="#D4AF37" opacity="0.25"/>
      <circle cx="0" cy="60" r="1.2" fill="#D4AF37" opacity="0.25"/>
      <circle cx="60" cy="60" r="1.2" fill="#D4AF37" opacity="0.25"/>
    </pattern>

    <!-- Arabesque interlace pattern -->
    <pattern id="arabesquePattern" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <!-- Interlaced arcs forming Islamic geometric motif -->
      <path d="M0,40 Q20,20 40,40 Q60,60 80,40" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.3"/>
      <path d="M0,40 Q20,60 40,40 Q60,20 80,40" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.3"/>
      <path d="M40,0 Q20,20 40,40 Q60,60 40,80" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.3"/>
      <path d="M40,0 Q60,20 40,40 Q20,60 40,80" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.3"/>
      <!-- Small rosette at center -->
      <circle cx="40" cy="40" r="4" fill="none" stroke="#F5F0E1" stroke-width="0.4" opacity="0.25"/>
      <circle cx="40" cy="40" r="2" fill="#D4AF37" opacity="0.15"/>
      <!-- Corner rosettes -->
      <circle cx="0" cy="0" r="3" fill="none" stroke="#D4AF37" stroke-width="0.35" opacity="0.2"/>
      <circle cx="80" cy="0" r="3" fill="none" stroke="#D4AF37" stroke-width="0.35" opacity="0.2"/>
      <circle cx="0" cy="80" r="3" fill="none" stroke="#D4AF37" stroke-width="0.35" opacity="0.2"/>
      <circle cx="80" cy="80" r="3" fill="none" stroke="#D4AF37" stroke-width="0.35" opacity="0.2"/>
    </pattern>

    <!-- Filigree detail pattern -->
    <pattern id="filigreeTile" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <!-- Floral rosette -->
      <g opacity="0.35">
        <ellipse cx="60" cy="60" rx="18" ry="6" fill="none" stroke="#D4AF37" stroke-width="0.5" transform="rotate(0,60,60)"/>
        <ellipse cx="60" cy="60" rx="18" ry="6" fill="none" stroke="#D4AF37" stroke-width="0.5" transform="rotate(45,60,60)"/>
        <ellipse cx="60" cy="60" rx="18" ry="6" fill="none" stroke="#D4AF37" stroke-width="0.5" transform="rotate(90,60,60)"/>
        <ellipse cx="60" cy="60" rx="18" ry="6" fill="none" stroke="#D4AF37" stroke-width="0.5" transform="rotate(135,60,60)"/>
      </g>
      <circle cx="60" cy="60" r="3" fill="#F5F0E1" opacity="0.2"/>
      <!-- Corner filaments -->
      <g opacity="0.2">
        <path d="M0,0 Q30,15 60,0" fill="none" stroke="#D4AF37" stroke-width="0.4"/>
        <path d="M0,0 Q15,30 0,60" fill="none" stroke="#D4AF37" stroke-width="0.4"/>
        <path d="M120,0 Q90,15 60,0" fill="none" stroke="#D4AF37" stroke-width="0.4"/>
        <path d="M120,0 Q105,30 120,60" fill="none" stroke="#D4AF37" stroke-width="0.4"/>
        <path d="M0,120 Q30,105 60,120" fill="none" stroke="#D4AF37" stroke-width="0.4"/>
        <path d="M0,120 Q15,90 0,60" fill="none" stroke="#D4AF37" stroke-width="0.4"/>
        <path d="M120,120 Q90,105 60,120" fill="none" stroke="#D4AF37" stroke-width="0.4"/>
        <path d="M120,120 Q105,90 120,60" fill="none" stroke="#D4AF37" stroke-width="0.4"/>
      </g>
    </pattern>

    <!-- Central diamond mask -->
    <clipPath id="cardClip">
      <rect x="0" y="0" width="630" height="882" rx="20" ry="20"/>
    </clipPath>
  </defs>

  <!-- Card shape with rounded corners -->
  <g clip-path="url(#cardClip)">
    
    <!-- Base bordeaux background with radial depth -->
    <rect width="630" height="882" fill="url(#bordeauxDepth)"/>
    
    <!-- Subtle cardstock texture overlay -->
    <rect width="630" height="882" fill="url(#bordeauxDepth)" filter="url(#cardTexture)" opacity="0.15"/>

    <!-- Layer 1: Arabesque interlace pattern (full card) -->
    <rect x="20" y="20" width="590" height="842" fill="url(#arabesquePattern)" opacity="0.7"/>

    <!-- Layer 2: Eight-pointed star pattern overlay -->
    <rect x="20" y="20" width="590" height="842" fill="url(#starPattern)" opacity="0.8"/>

    <!-- Layer 3: Filigree rosettes -->
    <rect x="20" y="20" width="590" height="842" fill="url(#filigreeTile)" opacity="0.6"/>

    <!-- ===== OUTER BORDER - Double golden frame ===== -->
    <!-- Outer border line -->
    <rect x="14" y="14" width="602" height="854" rx="16" ry="16" 
          fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.85"/>
    <!-- Inner border line -->
    <rect x="22" y="22" width="586" height="838" rx="12" ry="12" 
          fill="none" stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.65"/>
    <!-- Decorative line between borders -->
    <rect x="18" y="18" width="594" height="846" rx="14" ry="14" 
          fill="none" stroke="#D4AF37" stroke-width="0.4" stroke-dasharray="4,8" opacity="0.4"/>

    <!-- ===== CORNER STARS ===== -->
    <!-- Top-left corner star -->
    <g transform="translate(34, 34)" opacity="0.8" filter="url(#emboss)">
      <polygon points="0,-10 3,-3 10,-3 4.5,2 6.5,10 0,5.5 -6.5,10 -4.5,2 -10,-3 -3,-3" 
               fill="url(#goldGrad)" stroke="#C8A22E" stroke-width="0.3"/>
      <circle cx="0" cy="0" r="2.5" fill="#F5F0E1" opacity="0.5"/>
    </g>
    <!-- Top-right corner star -->
    <g transform="translate(596, 34)" opacity="0.8" filter="url(#emboss)">
      <polygon points="0,-10 3,-3 10,-3 4.5,2 6.5,10 0,5.5 -6.5,10 -4.5,2 -10,-3 -3,-3" 
               fill="url(#goldGrad)" stroke="#C8A22E" stroke-width="0.3"/>
      <circle cx="0" cy="0" r="2.5" fill="#F5F0E1" opacity="0.5"/>
    </g>
    <!-- Bottom-left corner star -->
    <g transform="translate(34, 848)" opacity="0.8" filter="url(#emboss)">
      <polygon points="0,-10 3,-3 10,-3 4.5,2 6.5,10 0,5.5 -6.5,10 -4.5,2 -10,-3 -3,-3" 
               fill="url(#goldGrad)" stroke="#C8A22E" stroke-width="0.3"/>
      <circle cx="0" cy="0" r="2.5" fill="#F5F0E1" opacity="0.5"/>
    </g>
    <!-- Bottom-right corner star -->
    <g transform="translate(596, 848)" opacity="0.8" filter="url(#emboss)">
      <polygon points="0,-10 3,-3 10,-3 4.5,2 6.5,10 0,5.5 -6.5,10 -4.5,2 -10,-3 -3,-3" 
               fill="url(#goldGrad)" stroke="#C8A22E" stroke-width="0.3"/>
      <circle cx="0" cy="0" r="2.5" fill="#F5F0E1" opacity="0.5"/>
    </g>

    <!-- ===== CENTRAL DIAMOND MOTIF ===== -->
    <!-- Large diamond outline -->
    <g transform="translate(315, 441)" filter="url(#emboss)">
      <!-- Outer diamond -->
      <polygon points="0,-200 160,-0 0,200 -160,0" 
               fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.7"/>
      <!-- Inner diamond -->
      <polygon points="0,-180 144,0 0,180 -144,0" 
               fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>
      <!-- Decorative diamond -->
      <polygon points="0,-160 128,0 0,160 -128,0" 
               fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-dasharray="6,4" opacity="0.35"/>

      <!-- Central ornate rosette -->
      <g opacity="0.7">
        <!-- Outer ring of petals -->
        <ellipse rx="55" ry="14" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" transform="rotate(0)"/>
        <ellipse rx="55" ry="14" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" transform="rotate(30)"/>
        <ellipse rx="55" ry="14" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" transform="rotate(60)"/>
        <ellipse rx="55" ry="14" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" transform="rotate(90)"/>
        <ellipse rx="55" ry="14" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" transform="rotate(120)"/>
        <ellipse rx="55" ry="14" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" transform="rotate(150)"/>
        
        <!-- Inner flower -->
        <ellipse rx="30" ry="8" fill="none" stroke="#F5F0E1" stroke-width="0.6" opacity="0.5" transform="rotate(0)"/>
        <ellipse rx="30" ry="8" fill="none" stroke="#F5F0E1" stroke-width="0.6" opacity="0.5" transform="rotate(45)"/>
        <ellipse rx="30" ry="8" fill="none" stroke="#F5F0E1" stroke-width="0.6" opacity="0.5" transform="rotate(90)"/>
        <ellipse rx="30" ry="8" fill="none" stroke="#F5F0E1" stroke-width="0.6" opacity="0.5" transform="rotate(135)"/>
        
        <!-- Center circles -->
        <circle r="15" fill="none" stroke="url(#goldGrad)" stroke-width="1"/>
        <circle r="8" fill="none" stroke="#F5F0E1" stroke-width="0.6" opacity="0.6"/>
        <circle r="3" fill="#D4AF37" opacity="0.6"/>
      </g>

      <!-- Diamond corner ornaments -->
      <!-- Top -->
      <g transform="translate(0,-170)" opacity="0.6">
        <circle r="5" fill="none" stroke="url(#goldGrad)" stroke-width="0.8"/>
        <circle r="2" fill="#D4AF37" opacity="0.5"/>
      </g>
      <!-- Right -->
      <g transform="translate(136,0)" opacity="0.6">
        <circle r="5" fill="none" stroke="url(#goldGrad)" stroke-width="0.8"/>
        <circle r="2" fill="#D4AF37" opacity="0.5"/>
      </g>
      <!-- Bottom -->
      <g transform="translate(0,170)" opacity="0.6">
        <circle r="5" fill="none" stroke="url(#goldGrad)" stroke-width="0.8"/>
        <circle r="2" fill="#D4AF37" opacity="0.5"/>
      </g>
      <!-- Left -->
      <g transform="translate(-136,0)" opacity="0.6">
        <circle r="5" fill="none" stroke="url(#goldGrad)" stroke-width="0.8"/>
        <circle r="2" fill="#D4AF37" opacity="0.5"/>
      </g>

      <!-- Eight-pointed stars at diamond midpoints -->
      <g transform="translate(80,-100)" opacity="0.5">
        <polygon points="0,-8 2.5,-2.5 8,-2.5 3.5,1.5 5,8 0,4.5 -5,8 -3.5,1.5 -8,-2.5 -2.5,-2.5" 
                 fill="url(#goldGrad)" stroke="#C8A22E" stroke-width="0.2"/>
      </g>
      <g transform="translate(80,100)" opacity="0.5">
        <polygon points="0,-8 2.5,-2.5 8,-2.5 3.5,1.5 5,8 0,4.5 -5,8 -3.5,1.5 -8,-2.5 -2.5,-2.5" 
                 fill="url(#goldGrad)" stroke="#C8A22E" stroke-width="0.2"/>
      </g>
      <g transform="translate(-80,-100)" opacity="0.5">
        <polygon points="0,-8 2.5,-2.5 8,-2.5 3.5,1.5 5,8 0,4.5 -5,8 -3.5,1.5 -8,-2.5 -2.5,-2.5" 
                 fill="url(#goldGrad)" stroke="#C8A22E" stroke-width="0.2"/>
      </g>
      <g transform="translate(-80,100)" opacity="0.5">
        <polygon points="0,-8 2.5,-2.5 8,-2.5 3.5,1.5 5,8 0,4.5 -5,8 -3.5,1.5 -8,-2.5 -2.5,-2.5" 
                 fill="url(#goldGrad)" stroke="#C8A22E" stroke-width="0.2"/>
      </g>

      <!-- Arabesque curves inside diamond -->
      <g opacity="0.4">
        <path d="M0,-150 C40,-100 40,-50 0,0 C-40,50 -40,100 0,150" fill="none" stroke="#D4AF37" stroke-width="0.6"/>
        <path d="M-120,0 C-80,-40 -40,-40 0,0 C40,40 80,40 120,0" fill="none" stroke="#D4AF37" stroke-width="0.6"/>
        <!-- Diagonal curves -->
        <path d="M-100,-120 Q0,-60 100,-120" fill="none" stroke="#F5F0E1" stroke-width="0.4" opacity="0.5"/>
        <path d="M-100,120 Q0,60 100,120" fill="none" stroke="#F5F0E1" stroke-width="0.4" opacity="0.5"/>
      </g>
    </g>

    <!-- ===== DECORATIVE ELEMENTS OUTSIDE DIAMOND ===== -->
    <!-- Top decorative cluster -->
    <g transform="translate(315, 80)" opacity="0.5" filter="url(#emboss)">
      <polygon points="0,-15 4.5,-4.5 15,-4.5 7,2 9,15 0,8 -9,15 -7,2 -15,-4.5 -4.5,-4.5" 
               fill="url(#goldGrad)"/>
      <line x1="-40" y1="0" x2="-18" y2="0" stroke="url(#goldGrad)" stroke-width="0.8"/>
      <line x1="18" y1="0" x2="40" y2="0" stroke="url(#goldGrad)" stroke-width="0.8"/>
    </g>
    <!-- Bottom decorative cluster -->
    <g transform="translate(315, 802)" opacity="0.5" filter="url(#emboss)">
      <polygon points="0,-15 4.5,-4.5 15,-4.5 7,2 9,15 0,8 -9,15 -7,2 -15,-4.5 -4.5,-4.5" 
               fill="url(#goldGrad)"/>
      <line x1="-40" y1="0" x2="-18" y2="0" stroke="url(#goldGrad)" stroke-width="0.8"/>
      <line x1="18" y1="0" x2="40" y2="0" stroke="url(#goldGrad)" stroke-width="0.8"/>
    </g>

    <!-- Horizontal decorative lines -->
    <g opacity="0.35">
      <!-- Top zone -->
      <line x1="60" y1="120" x2="570" y2="120" stroke="url(#goldGrad)" stroke-width="0.5" stroke-dasharray="2,6"/>
      <line x1="60" y1="762" x2="570" y2="762" stroke="url(#goldGrad)" stroke-width="0.5" stroke-dasharray="2,6"/>
      <!-- Vertical lines -->
      <line x1="60" y1="120" x2="60" y2="762" stroke="url(#goldGrad)" stroke-width="0.3" stroke-dasharray="2,8"/>
      <line x1="570" y1="120" x2="570" y2="762" stroke="url(#goldGrad)" stroke-width="0.3" stroke-dasharray="2,8"/>
    </g>

    <!-- ===== ADDITIONAL EIGHT-POINTED STARS scattered ===== -->
    <!-- Top-left large star -->
    <g transform="translate(100, 180)" opacity="0.4">
      <polygon points="0,-18 5.5,-5.5 18,-5.5 8,3 11,18 0,10 -11,18 -8,3 -18,-5.5 -5.5,-5.5" 
               fill="none" stroke="url(#goldGrad)" stroke-width="0.8"/>
      <circle r="4" fill="none" stroke="#F5F0E1" stroke-width="0.4" opacity="0.5"/>
    </g>
    <!-- Top-right large star -->
    <g transform="translate(530, 180)" opacity="0.4">
      <polygon points="0,-18 5.5,-5.5 18,-5.5 8,3 11,18 0,10 -11,18 -8,3 -18,-5.5 -5.5,-5.5" 
               fill="none" stroke="url(#goldGrad)" stroke-width="0.8"/>
      <circle r="4" fill="none" stroke="#F5F0E1" stroke-width="0.4" opacity="0.5"/>
    </g>
    <!-- Bottom-left large star -->
    <g transform="translate(100, 702)" opacity="0.4">
      <polygon points="0,-18 5.5,-5.5 18,-5.5 8,3 11,18 0,10 -11,18 -8,3 -18,-5.5 -5.5,-5.5" 
               fill="none" stroke="url(#goldGrad)" stroke-width="0.8"/>
      <circle r="4" fill="none" stroke="#F5F0E1" stroke-width="0.4" opacity="0.5"/>
    </g>
    <!-- Bottom-right large star -->
    <g transform="translate(530, 702)" opacity="0.4">
      <polygon points="0,-18 5.5,-5.5 18,-5.5 8,3 11,18 0,10 -11,18 -8,3 -18,-5.5 -5.5,-5.5" 
               fill="none" stroke="url(#goldGrad)" stroke-width="0.8"/>
      <circle r="4" fill="none" stroke="#F5F0E1" stroke-width="0.4" opacity="0.5"/>
    </g>

    <!-- Side medallions -->
    <!-- Left medallion -->
    <g transform="translate(55, 441)" opacity="0.45">
      <circle r="20" fill="none" stroke="url(#goldGrad)" stroke-width="0.8"/>
      <circle r="14" fill="none" stroke="#D4AF37" stroke-width="0.5"/>
      <circle r="8" fill="none" stroke="#F5F0E1" stroke-width="0.4"/>
      <circle r="3" fill="#D4AF37" opacity="0.4"/>
      <!-- Rays -->
      <line x1="0" y1="-22" x2="0" y2="-28" stroke="#D4AF37" stroke-width="0.4"/>
      <line x1="0" y1="22" x2="0" y2="28" stroke="#D4AF37" stroke-width="0.4"/>
      <line x1="-22" y1="0" x2="-28" y2="0" stroke="#D4AF37" stroke-width="0.4"/>
      <line x1="22" y1="0" x2="28" y2="0" stroke="#D4AF37" stroke-width="0.4"/>
    </g>
    <!-- Right medallion -->
    <g transform="translate(575, 441)" opacity="0.45">
      <circle r="20" fill="none" stroke="url(#goldGrad)" stroke-width="0.8"/>
      <circle r="14" fill="none" stroke="#D4AF37" stroke-width="0.5"/>
      <circle r="8" fill="none" stroke="#F5F0E1" stroke-width="0.4"/>
      <circle r="3" fill="#D4AF37" opacity="0.4"/>
      <line x1="0" y1="-22" x2="0" y2="-28" stroke="#D4AF37" stroke-width="0.4"/>
      <line x1="0" y1="22" x2="0" y2="28" stroke="#D4AF37" stroke-width="0.4"/>
      <line x1="-22" y1="0" x2="-28" y2="0" stroke="#D4AF37" stroke-width="0.4"/>
      <line x1="22" y1="0" x2="28" y2="0" stroke="#D4AF37" stroke-width="0.4"/>
    </g>

    <!-- ===== GOLD FOIL SHIMMER OVERLAY ===== -->
    <rect width="630" height="882" fill="url(#foilShimmer)" opacity="0.5"/>
    
    <!-- Vignette effect for premium depth -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
      <stop offset="50%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#3D0A14" stop-opacity="0.4"/>
    </radialGradient>
    <rect width="630" height="882" fill="url(#vignette)"/>

    <!-- Final subtle matte finish overlay -->
    <rect width="630" height="882" fill="rgba(139, 30, 47, 0.05)"/>
  </g>
  
  <!-- Card rounded border mask -->
  <rect x="0" y="0" width="630" height="882" rx="20" ry="20" 
        fill="none" stroke="#5A1020" stroke-width="1"/>
</svg>
