<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224 320" width="224" height="320">
  <defs>
    <!-- Gradient fond bordeaux -->
    <linearGradient id="bgGradGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a0e1e"/>
      <stop offset="50%" stop-color="#5c1428"/>
      <stop offset="100%" stop-color="#3d0b18"/>
    </linearGradient>
    <!-- Gold shimmer gradient -->
    <linearGradient id="goldShimmer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a832"/>
      <stop offset="25%" stop-color="#f0d060"/>
      <stop offset="50%" stop-color="#c8942a"/>
      <stop offset="75%" stop-color="#e8c848"/>
      <stop offset="100%" stop-color="#b8882a"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5e690"/>
      <stop offset="100%" stop-color="#c8942a"/>
    </linearGradient>

    <!-- Motif losanges dorés avancé -->
    <pattern id="advGoldDiamond" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse" patternTransform="rotate(45 112 160)">
      <!-- Fond -->
      <rect width="36" height="36" fill="none"/>
      <!-- Cadre extérieur -->
      <rect x="1" y="1" width="34" height="34" rx="1.5" ry="1.5" fill="none" stroke="#d4a832" stroke-width="0.8" opacity="0.65"/>
      <!-- Cadre intérieur -->
      <rect x="3.5" y="3.5" width="29" height="29" rx="1" ry="1" fill="none" stroke="#d4a832" stroke-width="0.4" opacity="0.4"/>
      <!-- Cadre pointillé -->
      <rect x="5.5" y="5.5" width="25" height="25" rx="0.5" ry="0.5" fill="none" stroke="#f0d060" stroke-width="0.3" stroke-dasharray="2 2" opacity="0.3"/>
      <!-- Rosette ornementale centrale -->
      <g transform="translate(18, 18)">
        <!-- Pétales principaux (8 directions) -->
        <ellipse rx="9.5" ry="2.2" fill="#d4a832" opacity="0.22" transform="rotate(0)"/>
        <ellipse rx="9.5" ry="2.2" fill="#d4a832" opacity="0.22" transform="rotate(45)"/>
        <ellipse rx="9.5" ry="2.2" fill="#d4a832" opacity="0.22" transform="rotate(90)"/>
        <ellipse rx="9.5" ry="2.2" fill="#d4a832" opacity="0.22" transform="rotate(135)"/>
        <!-- Pétales secondaires -->
        <ellipse rx="7" ry="1.6" fill="#f0d060" opacity="0.25" transform="rotate(22.5)"/>
        <ellipse rx="7" ry="1.6" fill="#f0d060" opacity="0.25" transform="rotate(67.5)"/>
        <ellipse rx="7" ry="1.6" fill="#f0d060" opacity="0.25" transform="rotate(112.5)"/>
        <ellipse rx="7" ry="1.6" fill="#f0d060" opacity="0.25" transform="rotate(157.5)"/>
        <!-- Cercles concentriques -->
        <circle r="6" fill="none" stroke="#d4a832" stroke-width="0.6" opacity="0.45"/>
        <circle r="4.2" fill="none" stroke="#f0d060" stroke-width="0.4" opacity="0.35"/>
        <circle r="2.5" fill="none" stroke="#d4a832" stroke-width="0.5" opacity="0.5"/>
        <circle r="1.3" fill="#d4a832" opacity="0.55"/>
        <!-- Petits cercles autour du centre -->
        <circle cx="4.2" cy="0" r="0.6" fill="#f0d060" opacity="0.4"/>
        <circle cx="-4.2" cy="0" r="0.6" fill="#f0d060" opacity="0.4"/>
        <circle cx="0" cy="4.2" r="0.6" fill="#f0d060" opacity="0.4"/>
        <circle cx="0" cy="-4.2" r="0.6" fill="#f0d060" opacity="0.4"/>
        <circle cx="3" cy="3" r="0.5" fill="#d4a832" opacity="0.35"/>
        <circle cx="-3" cy="3" r="0.5" fill="#d4a832" opacity="0.35"/>
        <circle cx="3" cy="-3" r="0.5" fill="#d4a832" opacity="0.35"/>
        <circle cx="-3" cy="-3" r="0.5" fill="#d4a832" opacity="0.35"/>
        <!-- Gouttes/teardrops cardinales -->
        <path d="M0,-11 Q1.8,-7.5 0,-4.5 Q-1.8,-7.5 0,-11Z" fill="#d4a832" opacity="0.35"/>
        <path d="M0,11 Q1.8,7.5 0,4.5 Q-1.8,7.5 0,11Z" fill="#d4a832" opacity="0.35"/>
        <path d="M-11,0 Q-7.5,1.8 -4.5,0 Q-7.5,-1.8 -11,0Z" fill="#d4a832" opacity="0.35"/>
        <path d="M11,0 Q7.5,1.8 4.5,0 Q7.5,-1.8 11,0Z" fill="#d4a832" opacity="0.35"/>
        <!-- Feuilles diagonales -->
        <path d="M7,7 Q9,5 11,7 Q9,9 7,7Z" fill="#f0d060" opacity="0.2"/>
        <path d="M-7,7 Q-9,5 -11,7 Q-9,9 -7,7Z" fill="#f0d060" opacity="0.2"/>
        <path d="M7,-7 Q9,-5 11,-7 Q9,-9 7,-7Z" fill="#f0d060" opacity="0.2"/>
        <path d="M-7,-7 Q-9,-5 -11,-7 Q-9,-9 -7,-7Z" fill="#f0d060" opacity="0.2"/>
      </g>
      <!-- Points de coin -->
      <circle cx="1" cy="1" r="1" fill="#d4a832" opacity="0.25"/>
      <circle cx="35" cy="1" r="1" fill="#d4a832" opacity="0.25"/>
      <circle cx="1" cy="35" r="1" fill="#d4a832" opacity="0.25"/>
      <circle cx="35" cy="35" r="1" fill="#d4a832" opacity="0.25"/>
      <!-- Losanges de coin -->
      <path d="M18,0 L19.5,1.5 L18,3 L16.5,1.5Z" fill="#f0d060" opacity="0.2"/>
      <path d="M18,33 L19.5,34.5 L18,36 L16.5,34.5Z" fill="#f0d060" opacity="0.2"/>
      <path d="M0,18 L1.5,16.5 L3,18 L1.5,19.5Z" fill="#f0d060" opacity="0.2"/>
      <path d="M33,18 L34.5,16.5 L36,18 L34.5,19.5Z" fill="#f0d060" opacity="0.2"/>
    </pattern>

    <!-- Grille fine dorée -->
    <pattern id="advGoldGrid" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse" patternTransform="rotate(45 112 160)">
      <line x1="0" y1="0" x2="36" y2="0" stroke="#d4a832" stroke-width="0.25" opacity="0.15"/>
      <line x1="0" y1="0" x2="0" y2="36" stroke="#d4a832" stroke-width="0.25" opacity="0.15"/>
    </pattern>

    <!-- Cadre ornemental -->
    <pattern id="borderOrnament" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1.5" fill="none" stroke="#d4a832" stroke-width="0.4" opacity="0.3"/>
      <path d="M10,5 Q12,8 10,10 Q8,8 10,5Z" fill="#d4a832" opacity="0.15"/>
      <path d="M10,15 Q12,12 10,10 Q8,12 10,15Z" fill="#d4a832" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Fond bordeaux avec gradient -->
  <rect width="224" height="320" fill="url(#bgGradGold)" rx="6" ry="6"/>

  <!-- Cadre décoratif extérieur -->
  <rect x="4" y="4" width="216" height="312" rx="4" ry="4" fill="none" stroke="#d4a832" stroke-width="1.2" opacity="0.6"/>
  <rect x="7" y="7" width="210" height="306" rx="3" ry="3" fill="none" stroke="#f0d060" stroke-width="0.5" opacity="0.35"/>

  <!-- Zone pointillée décorative -->
  <rect x="9.5" y="9.5" width="205" height="301" rx="2.5" ry="2.5" fill="none" stroke="#d4a832" stroke-width="0.4" stroke-dasharray="3 2" opacity="0.25"/>

  <!-- Grille fine -->
  <rect x="12" y="12" width="200" height="296" fill="url(#advGoldGrid)" rx="2" ry="2"/>

  <!-- Motif principal -->
  <rect x="12" y="12" width="200" height="296" fill="url(#advGoldDiamond)" rx="2" ry="2"/>

  <!-- Coins ornementaux -->
  <g opacity="0.5">
    <!-- Coin haut-gauche -->
    <g transform="translate(18, 18)">
      <path d="M0,0 Q8,-1 12,0 Q13,4 12,12 Q8,13 0,12 Q-1,8 0,0Z" fill="none" stroke="#d4a832" stroke-width="0.6"/>
      <circle cx="6" cy="6" r="2" fill="none" stroke="#f0d060" stroke-width="0.5"/>
      <circle cx="6" cy="6" r="0.8" fill="#d4a832"/>
    </g>
    <!-- Coin haut-droit -->
    <g transform="translate(206, 18) scale(-1,1)">
      <path d="M0,0 Q8,-1 12,0 Q13,4 12,12 Q8,13 0,12 Q-1,8 0,0Z" fill="none" stroke="#d4a832" stroke-width="0.6"/>
      <circle cx="6" cy="6" r="2" fill="none" stroke="#f0d060" stroke-width="0.5"/>
      <circle cx="6" cy="6" r="0.8" fill="#d4a832"/>
    </g>
    <!-- Coin bas-gauche -->
    <g transform="translate(18, 302) scale(1,-1)">
      <path d="M0,0 Q8,-1 12,0 Q13,4 12,12 Q8,13 0,12 Q-1,8 0,0Z" fill="none" stroke="#d4a832" stroke-width="0.6"/>
      <circle cx="6" cy="6" r="2" fill="none" stroke="#f0d060" stroke-width="0.5"/>
      <circle cx="6" cy="6" r="0.8" fill="#d4a832"/>
    </g>
    <!-- Coin bas-droit -->
    <g transform="translate(206, 302) scale(-1,-1)">
      <path d="M0,0 Q8,-1 12,0 Q13,4 12,12 Q8,13 0,12 Q-1,8 0,0Z" fill="none" stroke="#d4a832" stroke-width="0.6"/>
      <circle cx="6" cy="6" r="2" fill="none" stroke="#f0d060" stroke-width="0.5"/>
      <circle cx="6" cy="6" r="0.8" fill="#d4a832"/>
    </g>
  </g>

  <!-- Médaillon central -->
  <g transform="translate(112, 160)" opacity="0.55">
    <!-- Grand cercle -->
    <circle r="32" fill="none" stroke="#d4a832" stroke-width="1" opacity="0.5"/>
    <circle r="30" fill="none" stroke="#f0d060" stroke-width="0.4" opacity="0.35"/>
    <circle r="27" fill="none" stroke="#d4a832" stroke-width="0.6" opacity="0.4"/>
    <!-- Étoile à 8 branches -->
    <polygon points="0,-24 5,-8 24,0 8,5 0,24 -5,8 -24,0 -8,-5" fill="none" stroke="#d4a832" stroke-width="0.6" opacity="0.4"/>
    <polygon points="0,-18 4,-6 18,0 6,4 0,18 -4,6 -18,0 -6,-4" fill="none" stroke="#f0d060" stroke-width="0.4" opacity="0.3"/>
    <!-- Rosette intérieure -->
    <ellipse rx="14" ry="4" fill="#d4a832" opacity="0.12" transform="rotate(0)"/>
    <ellipse rx="14" ry="4" fill="#d4a832" opacity="0.12" transform="rotate(30)"/>
    <ellipse rx="14" ry="4" fill="#d4a832" opacity="0.12" transform="rotate(60)"/>
    <ellipse rx="14" ry="4" fill="#d4a832" opacity="0.12" transform="rotate(90)"/>
    <ellipse rx="14" ry="4" fill="#d4a832" opacity="0.12" transform="rotate(120)"/>
    <ellipse rx="14" ry="4" fill="#d4a832" opacity="0.12" transform="rotate(150)"/>
    <!-- Centre du médaillon -->
    <circle r="8" fill="none" stroke="#d4a832" stroke-width="0.8" opacity="0.5"/>
    <circle r="5" fill="none" stroke="#f0d060" stroke-width="0.5" opacity="0.4"/>
    <circle r="2.5" fill="#d4a832" opacity="0.4"/>
    <!-- Points cardinaux du médaillon -->
    <circle cx="0" cy="-20" r="1.5" fill="#f0d060" opacity="0.35"/>
    <circle cx="0" cy="20" r="1.5" fill="#f0d060" opacity="0.35"/>
    <circle cx="-20" cy="0" r="1.5" fill="#f0d060" opacity="0.35"/>
    <circle cx="20" cy="0" r="1.5" fill="#f0d060" opacity="0.35"/>
    <circle cx="14" cy="-14" r="1.2" fill="#d4a832" opacity="0.3"/>
    <circle cx="-14" cy="-14" r="1.2" fill="#d4a832" opacity="0.3"/>
    <circle cx="14" cy="14" r="1.2" fill="#d4a832" opacity="0.3"/>
    <circle cx="-14" cy="14" r="1.2" fill="#d4a832" opacity="0.3"/>
  </g>

  <!-- Filets décoratifs horizontaux -->
  <line x1="35" y1="55" x2="189" y2="55" stroke="#d4a832" stroke-width="0.4" opacity="0.3"/>
  <line x1="35" y1="265" x2="189" y2="265" stroke="#d4a832" stroke-width="0.4" opacity="0.3"/>

  <!-- Petits losanges sur les filets -->
  <path d="M112,52 L115,55 L112,58 L109,55Z" fill="#d4a832" opacity="0.35"/>
  <path d="M112,262 L115,265 L112,268 L109,265Z" fill="#d4a832" opacity="0.35"/>

  <!-- Bordure finale -->
  <rect width="224" height="320" fill="none" stroke="#d4a832" stroke-width="0.5" opacity="0.2" rx="6" ry="6"/>
</svg>
